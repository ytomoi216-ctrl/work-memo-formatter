<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI相談用プロンプトメーカー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>AI相談用プロンプトメーカー</h1>

    <p>雑な業務メモを、ChatGPTなどに相談しやすいプロンプトに変換するツールです。</p>

    <textarea id="inputMemo" placeholder="ここに業務メモを入力してください"></textarea>

    <div class="control-area">
      <label for="formatType">作りたいプロンプト</label>

      <select id="formatType">
        <option value="share">社内共有文を作りたい</option>
        <option value="consult">上長相談文を作りたい</option>
        <option value="reply">チャット返信文を作りたい</option>
      </select>
    </div>

    <div class="control-area">
  <label for="toneType">トーン</label>

  <select id="toneType">
    <option value="polite">丁寧</option>
    <option value="simple">簡潔</option>
    <option value="soft">やわらかめ</option>
    <option value="formal">フォーマル</option>
    <option value="gentle-refusal">強すぎない断り</option>
  </select>
    </div>

    <div class="button-area">
      <button id="formatButton">プロンプトを作成する</button>
      <button id="clearButton" type="button" class="secondary-button">クリア</button>
    </div>

    <h2 class="output-title">AIに貼るプロンプト</h2>

    <textarea id="outputMemo" placeholder="ここにAI相談用プロンプトが表示されます" readonly></textarea>

    <button id="copyButton" type="button">コピーする</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
